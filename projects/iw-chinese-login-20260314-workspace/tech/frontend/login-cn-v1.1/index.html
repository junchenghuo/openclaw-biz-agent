<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录无限世界</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg-pattern" aria-hidden="true"></div>
    <main class="layout">
      <section class="brand" aria-label="品牌展示区">
        <div class="seal" aria-hidden="true">印</div>
        <h1>登录无限世界</h1>
        <p class="subtitle">一卷山海入梦来，万象同游此间开</p>
        <p class="tagline">东方幻想 · 沉浸新生</p>
      </section>

      <section class="card-wrap">
        <form id="loginForm" class="card" novalidate>
          <h2>账号登录</h2>

          <label for="account">账号</label>
          <input
            id="account"
            name="account"
            type="text"
            autocomplete="username"
            placeholder="请输入手机号（优先）/ 邮箱 / 用户名"
            aria-describedby="accountError"
          />
          <p id="accountError" class="field-error" aria-live="polite"></p>

          <label for="password">密码</label>
          <div class="password-row">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="请输入登录密码"
              aria-describedby="passwordError"
            />
            <button type="button" id="togglePassword" class="text-btn">显示密码</button>
          </div>
          <p id="passwordError" class="field-error" aria-live="polite"></p>

          <div class="options-row">
            <label class="checkbox-wrap" for="rememberMe">
              <input id="rememberMe" name="rememberMe" type="checkbox" />
              <span>记住我</span>
            </label>
            <a href="#" aria-disabled="true">忘记密码</a>
          </div>

          <p id="globalError" class="global-error" aria-live="polite"></p>

          <button id="submitBtn" type="submit" class="submit-btn">登 录</button>
        </form>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
